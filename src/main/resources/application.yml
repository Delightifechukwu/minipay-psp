spring:
  application:
    name: minipay-psp

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/minipay}
    username: ${DB_USER:minipay}
    password: ${DB_PASS:secret}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 50
          fetch_size: 100
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 2000ms

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  mvc:
    problem-details:
      enabled: true

  lifecycle:
    timeout-per-shutdown-phase: 30s

  servlet:
    multipart:
      max-request-size: 10MB
      max-file-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:minipay-super-secret-key-change-in-production-must-be-256-bits}
    ttl-minutes: ${JWT_TTL_MIN:30}
    refresh-ttl-hours: ${JWT_REFRESH_TTL_H:24}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  rate-limit:
    login:
      capacity: 5
      refill-tokens: 5
      refill-seconds: 60
    payment:
      capacity: 100
      refill-tokens: 100
      refill-seconds: 60
  webhook:
    retry:
      max-attempts: 5
      initial-delay-ms: 1000
      multiplier: 2.0
      max-delay-ms: 30000
  settlement:
    cron: "0 0 1 * * *"   # 1 AM daily

server:
  port: 8080
  shutdown: graceful
  tomcat:
    max-http-form-post-size: 2MB
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_PROBABILITY:0.1}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

resilience4j:
  circuitbreaker:
    instances:
      webhookDelivery:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha
  info:
    title: MiniPay PSP API
    description: Payment Service Provider Backend
    version: 1.0.0

logging:
  level:
    com.minipay: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n"